<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kreise0noch_ohne_OO.py – Vorschau</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
      }

      #sketch-holder {
        display: block;
        line-height: 0;
      }

      canvas {
        display: block;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.0.0/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.18.1/full/pyodide.js"></script>
    <script>
      function checkForSketch() {
        return "def setup():\n    size(200, 200)\n\n\ndef draw():\n    background(200)\n    durchmesser = width / 2\n    max_aenderung = 20\n    aktueller_durchmesser = durchmesser + sin(frame_count / 30) * max_aenderung\n    fill(0, 0, 255)\n    circle(width / 2, height / 2, aktueller_durchmesser)\n";
      }
    </script>
  </head>
  <body tabindex="0">
    <div id="sketch-holder"></div>
    <script>
      const handledKeys = ["w", "a", "s", "d", "W", "A", "S", "D"];

      window.addEventListener("load", () => {
        document.body.focus();
      });

      window.addEventListener("pointerdown", () => {
        window.focus();
        document.body.focus();
      });

      window.addEventListener("keydown", (event) => {
        if (handledKeys.includes(event.key)) {
          event.preventDefault();
        }
      });

      window.addEventListener("keyup", (event) => {
        if (handledKeys.includes(event.key)) {
          event.preventDefault();
        }
      });
    </script>
    <script src="https://abav.lugaralgum.com/pyp5js/py5mode/target/target_sketch.js"></script>
  </body>
</html>

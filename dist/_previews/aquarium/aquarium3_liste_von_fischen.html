    <script>
      function checkForSketch() {
        return "def draw_background():\n    for row in range(height):\n        blend = row / height\n        stroke(18, 110 + 60 * blend, 170 + 40 * blend)\n        line(0, row, width, row)\n\n    no_stroke()\n    fill(19, 100, 70, 170)\n    rect(0, height - 38, width, 38)\n\n    fill(204, 182, 112)\n    rect(0, height - 14, width, 14)\n\n\nclass Fish:\n    def __init__(self, x_position, y_position, scale, body_color, fin_color):\n        self.x = x_position\n        self.y = y_position\n        self.scale = scale\n        self.body_color = body_color\n        self.fin_color = fin_color\n\n    def draw(self):\n        body_length = 84 * self.scale\n        body_height = 42 * self.scale\n        tail_length = 28 * self.scale\n\n        no_stroke()\n        fill(self.body_color)\n        ellipse(self.x, self.y, body_length, body_height)\n\n        fill(self.fin_color)\n        triangle(\n            self.x - body_length * 0.48,\n            self.y,\n            self.x - body_length * 0.48 - tail_length,\n            self.y - body_height * 0.45,\n            self.x - body_length * 0.48 - tail_length,\n            self.y + body_height * 0.45,\n        )\n\n        fill(255)\n        circle(\n            self.x + body_length * 0.26, self.y - body_height * 0.12, 11 * self.scale\n        )\n        fill(15)\n        circle(self.x + body_length * 0.28, self.y - body_height * 0.12, 5 * self.scale)\n\n\ndef create_random_fish():\n    return Fish(\n        random(70, width - 70),\n        random(70, height - 55),\n        random(0.7, 1.25),\n        color(random(90, 255), random(120, 230), random(80, 180)),\n        color(random(220, 255), random(110, 180), random(50, 120)),\n    )\n\n\ndef setup():\n    global fishes\n    size(420, 260)\n    fishes = []\n\n    for _ in range(6):\n        fishes.append(create_random_fish())\n\n\ndef draw():\n    draw_background()\n\n    for fish in fishes:\n        fish.draw()\n";
      }
    </script>
